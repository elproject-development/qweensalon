    <script>
      (function() {
        var pathSegments = window.location.pathname.slice(1).split('/');
        if (pathSegments.length > 0 && pathSegments[0] !== '') {
          sessionStorage.redirect = window.location.href;
          window.location.replace(window.location.origin + '/');
        }
      })();
    </script>

    <script type="module">
if (window.self === window.top) {
  let lastPath = "";
  function getPageNameFromPath(path) {
    const segments = path.split("/").filter(Boolean);
    return segments[0] || null;
  }
  function trackPageView() {
    const path = window.location.pathname;
    if (path === lastPath) return;
    lastPath = path;
    const pageName = getPageNameFromPath(path) || "home";
    const appId = "69f2e03d0bf151eda077e5e8";
    if (!appId) return;
    fetch(`/app-logs/${appId}/log-user-in-app/${pageName}`, {
      method: "POST",
    }).catch(() => {});
  }
  const originalPushState = history.pushState.bind(history);
  history.pushState = function (...args) {
    originalPushState(...args);
    trackPageView();
  };
  const originalReplaceState = history.replaceState.bind(history);
  history.replaceState = function (...args) {
    originalReplaceState(...args);
    trackPageView();
  };
  window.addEventListener("popstate", trackPageView);
  trackPageView();
}
</script>
